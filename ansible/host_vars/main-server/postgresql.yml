---
postgresql_global_config_options:
  - option: unix_socket_directories
    value: '{{ postgresql_unix_socket_directories | join(",") }}'
  - option: log_directory
    value: 'log'
  - option: archive_command
    value: 'pgbackrest --stanza=flexbiz archive-push %p'
  - option: archive_mode
    value: 'on'
  - option: max_wal_senders
    value: '3'
  - option: wal_level
    value: 'replica'
  - option: listen_addresses
    value: '*'

postgresql_hba_entries:
  - {type: local, database: all, user: postgres, auth_method: peer}
  - {type: local, database: all, user: all, auth_method: peer}
  - {type: host, database: all, user: all, address: '127.0.0.1/32', auth_method: "{{ postgresql_auth_method }}"}
  - {type: host, database: all, user: all, address: '192.168.0.0/16', auth_method: "{{ postgresql_auth_method }}"}
  - {type: host, database: all, user: all, address: '172.16.0.0/12', auth_method: "{{ postgresql_auth_method }}"}
  - {type: host, database: all, user: all, address: '::1/128', auth_method: "{{ postgresql_auth_method }}"}

postgresql_users:
  - name: flexbiz
    password: "{{ flexbiz_password }}"
  - name: "{{ zitadel_user }}"
    password: "{{ zitadel_password }}"
  - name: "{{ colibri_stat_db_user }}"
    password: "{{ colibri_stat_db_password }}"
  - name: "{{ mediacms_db_user }}"
    password: "{{ mediacms_db_password }}"
  - name: "{{ synapse_db_user }}"
    password: "{{ synapse_db_password }}"

postgresql_databases:
  - name: nextcloud
    owner: flexbiz
  - name: zitadel
    owner: "{{ zitadel_user }}"
  - name: colibri_stat_db
    owner: "{{ colibri_stat_db_user }}"
  - name: mediacms
    owner: "{{ mediacms_db_user }}"
  - name: synapse-db
    owner: "{{ synapse_db_user }}"
    lc_collate: "C"
    lc_ctype: "C"
    encoding: "UTF8"