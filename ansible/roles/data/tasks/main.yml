---
- name: Install requirements
  package:
    name: 
      - cifs-utils
    state: present

- name: Create storage box credentials file
  ansible.builtin.copy:
    dest: /etc/storage-box-credentials.txt
    content: |
      username={{ storagebox_user }}
      password={{ storagebox_password }}
    owner: root
    group: root
    mode: '0600'
- name: Ensure mount entry exists in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^//{{ storagebox_user }}\.your-storagebox\.de/backup\s'
    line: "//{{ storagebox_user }}.your-storagebox.de/backup /mnt cifs iocharset=utf8,rw,credentials=/etc/storage-box-credentials.txt,uid=200,gid=200,file_mode=0660,dir_mode=0770 0 0"
    state: present
    create: yes
- name: Mount storage box right now
  ansible.builtin.mount:
    path: /mnt
    src: "//{{ storagebox_user }}.your-storagebox.de/backup"
    fstype: cifs
    opts: "iocharset=utf8,rw,credentials=/etc/storage-box-credentials.txt,uid=200,gid=200,file_mode=0660,dir_mode=0770"
    state: mounted

- name: Create synapse storage box credentials file
  ansible.builtin.copy:
    dest: /etc/storage-box-synapse-credentials.txt
    content: |
      username={{ storagebox_synapse_user }}
      password={{ storagebox_synapse_password }}
    owner: root
    group: root
    mode: '0600'
- name: Ensure synapse mount entry exists in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^{{ storagebox_synapse_url }}\s'
    line: "{{ storagebox_synapse_url }} /synapse cifs iocharset=utf8,rw,credentials=/etc/storage-box-synapse-credentials.txt,uid=991,gid=991,file_mode=0665,dir_mode=0775 0 0"
    state: present
    create: yes
- name: Mount synapse storage box right now
  ansible.builtin.mount:
    path: /synapse
    src: "{{ storagebox_synapse_url }}"
    fstype: cifs
    opts: "iocharset=utf8,rw,credentials=/etc/storage-box-synapse-credentials.txt,uid=991,gid=991,file_mode=0665,dir_mode=0775"
    state: mounted