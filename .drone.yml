---
kind: pipeline
type: docker
name: default

trigger:
  paths:
    include:
      - test/***
      - tests/***
      - .drone.yml

services:
  - name: moqui-search
    image: opensearchproject/opensearch:3.4.0
    environment:
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: MoquiElasticChangeMe@2026
      discovery.type: single-node
      network.host: _site_

steps:
  - name: clone-moqui
    image: alpine/git
    commands:
      - git clone --depth 1 https://github.com/grozadanut/moqui-framework.git moqui-framework

  - name: prepare-runtime
    image: gradle:8-jdk21
    environment:
      elasticsearch_url: https://moqui-search:9200
    commands:
      - cd moqui-framework
      - ./gradlew getComponent -Pcomponent=PopCommerce
      - ./gradlew getComponent -Pcomponent=mantle-udm
      - ./gradlew getComponent -Pcomponent=mantle-usl
      - ./gradlew getComponent -Pcomponent=CredentialManager
      - ./gradlew getComponent -Pcomponent=moqui-anaf-efactura
    depends_on:
      - clone-moqui

  - name: verify-component
    image: alpine:latest
    commands:
      - find moqui-framework -path "*moqui-anaf-efactura*" -maxdepth 7
    depends_on:
      - prepare-runtime

  - name: mockoon
    image: mockoon/cli:latest
    command: ["--data", "./moqui-framework/runtime/component/moqui-anaf-efactura/src/test/resources/efactura_mockoon.json", "--port", "3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 2s
      timeout: 5s
      retries: 5
    depends_on:
      - prepare-runtime
    detach: true

  - name: load-demo-data
    image: gradle:8-jdk21
    environment:
      elasticsearch_url: https://moqui-search:9200
    commands:
      - cd moqui-framework
      - ./gradlew cleanDb cleanLog cleanSessions cleanTempDir cleanOther
      - ./gradlew load
    depends_on:
      - mockoon

  - name: test
    image: gradle:8-jdk21
    environment:
      elasticsearch_url: https://moqui-search:9200
    commands:
      - cd moqui-framework
      - ./gradlew test
    depends_on:
      - load-demo-data

  - name: moqui
    image: gradle:8-jdk21
    environment:
      elasticsearch_url: https://moqui-search:9200
    commands:
      - cd moqui-framework
      - java -jar moqui.war port=8080
    depends_on:
      - test
    detach: true

  - name: go-test
    image: golang:1.26.3
    commands:
      - cd moqui-framework
      - go test ./...
    depends_on:
      - moqui

  - name: playwright-test
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    commands:
      - npm ci
      - npx playwright install --with-deps
      - npx playwright test --workers=1
    depends_on:
      - moqui

  - name: prepare-docker-context
    image: gradle:8-jdk21
    commands:
      - cd moqui-framework
      - ./gradlew cleanDb cleanLog cleanSessions cleanTempDir cleanOther
      - ./gradlew build
      - cd docker/simple
      - unzip -q ../../moqui.war
      - cp -R ../../runtime .
    depends_on:
      - playwright-test

  - name: publish-docker
    image: plugins/docker
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      repo: grozadanut/moqui
      tags: flexbiz
      dockerfile: moqui-framework/docker/simple/Dockerfile
      build_args:
        - RUNTIME_IMAGE=eclipse-temurin:21-jdk
      context: moqui-framework/docker/simple
    depends_on:
      - prepare-docker-context