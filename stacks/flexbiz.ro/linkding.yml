services:
  linkding:
    image: 'sissbruecker/linkding:latest'
    volumes:
      - '/data/linkding:/etc/linkding/data'
    environment:
      - SERVICE_URL_LINKDING_9090
      - 'LD_SUPERUSER_NAME=${SERVICE_USER_LINKDING}'
      - 'LD_SUPERUSER_PASSWORD=${SERVICE_PASSWORD_LINKDING}'
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/9090' || exit 1"
      interval: 5s
      timeout: 5s
