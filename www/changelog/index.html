<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBiz — Jurnal Modificări</title>
    <meta name="description"
        content="Urmăriți cele mai recente actualizări, funcționalități noi și îmbunătățiri ale platformei FlexBiz.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ============================
           CSS Custom Properties
           ============================ */
        :root {
            --green: #1BC5BD;
            --green-light: #dcfffd;
            --green-dark: #133d3b;

            --bg-primary: #0a1a19;
            --bg-secondary: #0f2624;
            --bg-card: #132e2c;

            --text-primary: #e8f5f4;
            --text-secondary: #9bbdba;
            --text-muted: #5e8a87;

            --border-color: rgba(27, 197, 189, 0.12);
            --border-hover: rgba(27, 197, 189, 0.3);

            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);

            --radius-md: 12px;
            --radius-lg: 16px;

            --transition-normal: 0.3s ease;
        }

        /* ============================
           Reset & Base
           ============================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ============================
           Background Effects
           ============================ */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-effects::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(27, 197, 189, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-slow 20s ease-in-out infinite;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(19, 61, 59, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-slow 25s ease-in-out infinite reverse;
        }

        @keyframes float-slow {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -40px);
            }
        }

        /* ============================
           Layout
           ============================ */
        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ============================
           Header
           ============================ */
        .header {
            padding: 48px 0 40px;
            text-align: center;
        }

        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .header-logo img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(27, 197, 189, 0.3));
        }

        .header-logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-logo-text span:first-child {
            color: var(--text-primary);
        }

        .header-logo-text span:last-child {
            color: var(--green);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .header-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--green-dark));
            border-radius: 2px;
            margin: 24px auto 0;
        }

        /* ============================
           Markdown Wrapper Container
           ============================ */
        .markdown-container {
            background: rgba(19, 46, 44, 0.5);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-bottom: 80px;
            box-shadow: var(--shadow-md);
            color: var(--text-secondary);
            animation: fade-in-up 0.6s ease forwards;
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Markdown Styling */
        .markdown-container h1,
        .markdown-container h2,
        .markdown-container h3,
        .markdown-container h4 {
            color: var(--text-primary);
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .markdown-container h1 {
            font-size: 28px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            color: var(--green);
        }

        .markdown-container h2 {
            font-size: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 48px;
        }

        .markdown-container h3 {
            font-size: 18px;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .markdown-container p {
            margin-bottom: 16px;
            line-height: 1.7;
        }

        .markdown-container ul {
            padding-left: 24px;
            margin-bottom: 24px;
        }

        .markdown-container li {
            margin-bottom: 10px;
            position: relative;
        }

        .markdown-container li::marker {
            color: var(--green);
        }

        .markdown-container blockquote {
            border-left: 4px solid var(--green);
            padding-left: 16px;
            color: var(--text-muted);
            margin-bottom: 24px;
            background: rgba(27, 197, 189, 0.05);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
        }

        .markdown-container code {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            color: var(--green-light);
        }

        /* ============================
           Loading & Error
           ============================ */
        .loading {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 40px 0;
            color: #ff6b6b;
        }

        /* ============================
           Footer
           ============================ */
        .footer {
            text-align: center;
            padding: 32px 0 48px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
        }

        /* ============================
           Responsive
           ============================ */
        @media (max-width: 640px) {
            .page-wrapper {
                padding: 0 16px;
            }

            .markdown-container {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-effects"></div>

    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">
                <img src="../logo.png" alt="FlexBiz" onerror="this.src='logo.png'; this.onerror=null;">
                <div class="header-logo-text">
                    <span>Flex</span><span>Biz</span>
                </div>
            </div>
            <h1>Jurnal Modificări</h1>
            <div class="header-divider"></div>
        </header>

        <!-- Dynamic Content -->
        <main class="markdown-container" id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Se încarcă jurnalul de modificări...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; <span id="currentYear"></span> FlexBiz — Toate drepturile rezervate.</p>
        </footer>
    </div>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        async function loadChangelog() {
            try {
                const response = await fetch('changelog.md');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const markdownText = await response.text();

                document.getElementById('content').innerHTML = marked.parse(markdownText);
            } catch (error) {
                console.error('Eroare la încărcarea fișierului changelog.md:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error-state">
                        <div style="font-size: 40px; margin-bottom: 16px;">⚠️</div>
                        <p>Nu am putut încărca fișierul de modificări (changelog.md).</p>
                    </div>
                `;
            }
        }

        loadChangelog();
    </script>
</body>

</html>
